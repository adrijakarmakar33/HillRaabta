name: hill_raabta
description: "Stay connected in the hills - offline mesh communication app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  nearby_connections: ^4.1.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  http: ^1.2.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  sqflite: ^2.3.2
  path: ^1.9.0
  just_audio: ^0.9.36
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  uuid: ^4.3.3
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  file_picker: ^8.1.2
  open_filex: ^4.6.0
  share_plus: ^10.0.2
  cupertino_icons: ^1.0.8
  flutter_nearby_connections_plus: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/branding/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default:21


flutter:
  uses-material-design: true
  assets:
    - assets/branding/hill_raabta_wordmark.png